# kubernetes/notification-service/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: notification-sa
      containers:
        - name: notification
          # BullMQ email worker - single replica processes Redis queue
          image: acrclahan65bf2554.azurecr.io/clahan-notification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4006
          envFrom:
            - configMapRef:
                name: clahan-config
            - secretRef:
                name: clahan-secrets
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: clahan-config
                  key: NOTIFICATION_PORT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4006
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4006
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
