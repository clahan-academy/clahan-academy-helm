# kubernetes/ai-service/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ai-sa
      nodeSelector:
        pool: ai
      tolerations:
        - key: dedicated
          operator: Equal
          value: ai
          effect: NoSchedule
      containers:
        - name: ai
          # AI service on dedicated node - YOLO and InsightFace
          image: acrclahan65bf2554.azurecr.io/clahan-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: clahan-config
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: clahan-config
                  key: AI_PORT
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
