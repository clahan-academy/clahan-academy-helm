# kubernetes/proctoring-service/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: proctoring
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proctoring
  template:
    metadata:
      labels:
        app: proctoring
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: proctoring-sa
      containers:
        - name: proctoring
          # WebSocket proctoring - 2 replicas with session affinity
          image: acrclahanacademy.azurecr.io/clahan-proctoring:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4005
          envFrom:
            - configMapRef:
                name: clahan-config
            - secretRef:
                name: clahan-secrets
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: clahan-config
                  key: PROCTORING_PORT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4005
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4005
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
