# helm/clahan-academy/templates/httproute.yaml
# HTTPRoute - routes traffic to correct microservices
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clahan-routes
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: clahan-routes
    app.kubernetes.io/managed-by: helm
spec:
  parentRefs:
    - name: clahan-gateway
      namespace: {{ .Values.global.namespace }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    # Auth Service
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 4001

    # Admin Service
    - matches:
        - path:
            type: PathPrefix
            value: /api/admin
      backendRefs:
        - name: admin-service
          port: 4002

    # Student Service
    - matches:
        - path:
            type: PathPrefix
            value: /api/student
      backendRefs:
        - name: student-service
          port: 4003

    # Exam Service - timeout for this path is set via TrafficPolicy
    # (traffic-policy.yaml), not the standard Gateway API rules[].timeouts
    # field below this comment used to set. Confirmed by diffing live vs
    # git (same method that found the Gateway spec.infrastructure issue):
    # kgateway doesn't apply rules[].timeouts at all - it's not just
    # stripped from spec post-admission like spec.infrastructure, the
    # underlying Envoy route timeout was never actually configured, so
    # requests kept dying at whatever kgateway's unconfigured default is
    # regardless of this field's value. TrafficPolicy.spec.timeouts.request
    # is kgateway's own real mechanism for this, confirmed via
    # `kubectl explain trafficpolicies.gateway.kgateway.dev --recursive`.
    - matches:
        - path:
            type: PathPrefix
            value: /api/exams
      backendRefs:
        - name: exam-service
          port: 4004

    # Proctoring Service (WebSocket supported)
    - matches:
        - path:
            type: PathPrefix
            value: /api/proctor
      backendRefs:
        - name: proctoring-service
          port: 4005

    # Notification Service
    - matches:
        - path:
            type: PathPrefix
            value: /api/notifications
      backendRefs:
        - name: notification-service
          port: 4006

    # Frontend - catch all
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 5173