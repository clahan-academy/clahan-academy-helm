# helm/clahan-academy/templates/services/ollama-svc.yaml

apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: clahan-academy
  labels:
    {{- include "clahan.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ollama.port }}
      targetPort: {{ .Values.ollama.port }}
      protocol: TCP
      name: http
  selector:
    app: ollama
