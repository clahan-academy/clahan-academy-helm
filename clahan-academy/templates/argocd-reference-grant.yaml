# helm/clahan-academy/templates/argocd-reference-grant.yaml
# ReferenceGrant to allow HTTPRoutes in clahan-production namespace to target services in argocd namespace
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: argocd-reference-grant
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-reference-grant
    app.kubernetes.io/managed-by: helm
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.global.namespace }}
  to:
    - group: ""
      kind: Service
      name: argocd-server
