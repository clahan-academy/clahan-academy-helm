# helm/clahan-academy/templates/monitoring-routes.yaml
# HTTPRoutes to route traffic for grafana and prometheus subdomains
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: grafana-route
    app.kubernetes.io/managed-by: helm
spec:
  parentRefs:
    - name: clahan-gateway
      namespace: {{ .Values.global.namespace }}
  hostnames:
    - "grafana.{{ .Values.ingress.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          namespace: {{ .Values.global.monitoringNamespace }}
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus-route
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: prometheus-route
    app.kubernetes.io/managed-by: helm
spec:
  parentRefs:
    - name: clahan-gateway
      namespace: {{ .Values.global.namespace }}
  hostnames:
    - "prometheus.{{ .Values.ingress.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus
          namespace: {{ .Values.global.monitoringNamespace }}
          port: 9090
---
# Same Gateway API requirement as the ArgoCD route: an HTTPRoute in one
# namespace (clahan-production) needs an explicit ReferenceGrant in the
# TARGET namespace (monitoring) before it's allowed to reference Services
# there, or kgateway refuses to resolve the backend (RefNotPermitted).
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-monitoring
  namespace: {{ .Values.global.monitoringNamespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.global.namespace }}
  to:
    - group: ""
      kind: Service
      name: grafana
    - group: ""
      kind: Service
      name: prometheus
