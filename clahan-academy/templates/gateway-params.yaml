# Service type is ClusterIP, not LoadBalancer: kgateway's
# extraAnnotations never reliably propagated onto its generated Service
# (confirmed - it came up with zero annotations), and a separate
# Helm-managed Service (gateway-internal-lb.yaml) now fronts these same
# proxy pods directly with the internal-LB annotations baked in from
# creation, instead of depending on kgateway to apply them after the fact.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: clahan-gateway-params
  namespace: {{ .Values.global.namespace }}
spec:
  kube:
    service:
      type: ClusterIP
