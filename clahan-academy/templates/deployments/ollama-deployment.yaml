# helm/clahan-academy/templates/deployments/ollama-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: clahan-academy
  labels:
    {{- include "clahan.labels" . | nindent 4 }}
    app: ollama
spec:
  replicas: {{ .Values.ollama.replicaCount }}
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        {{- toYaml .Values.ollama.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.ollama.tolerations | nindent 8 }}
      initContainers:
        - name: pull-phi3-model
          image: "{{ .Values.ollama.image }}"
          command: ["sh", "-c"]
          args:
            - |
              ollama serve &
              OLLAMA_PID=$!
              sleep 10
              ollama pull phi3
              kill $OLLAMA_PID
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image }}"
          ports:
            - containerPort: {{ .Values.ollama.port }}
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
