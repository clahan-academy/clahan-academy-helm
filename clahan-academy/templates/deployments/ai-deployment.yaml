# helm/clahan-academy/templates/deployments/ai-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: clahan-academy
  labels:
    {{- include "clahan.labels" . | nindent 4 }}
    app: ai-service
spec:
  replicas: {{ .Values.ai.replicaCount }}
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: clahan-ai-sa
      nodeSelector:
        {{- toYaml .Values.ai.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.ai.tolerations | nindent 8 }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: clahan-ai-secrets
      containers:
        - name: ai
          image: "{{ .Values.ai.image.repository }}:{{ .Values.ai.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ai.port }}
          envFrom:
            - secretRef:
                name: clahan-ai-secrets
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.ai.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
