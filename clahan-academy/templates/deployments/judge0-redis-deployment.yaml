# helm/clahan-academy/templates/deployments/judge0-redis-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge0-redis
  namespace: clahan-academy
  labels:
    {{- include "clahan.labels" . | nindent 4 }}
    app: judge0-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge0-redis
  template:
    metadata:
      labels:
        app: judge0-redis
    spec:
      nodeSelector:
        {{- toYaml .Values.judge0.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.judge0.tolerations | nindent 8 }}
      containers:
        - name: redis
          image: "{{ .Values.judge0.redis.image }}"
          command: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: {{ .Values.judge0.redis.port }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
