# helm/clahan-academy/templates/argocd-route.yaml
# HTTPRoute to route traffic for argocd subdomain to argocd-server in the argocd namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-routes
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-routes
    app.kubernetes.io/managed-by: helm
spec:
  parentRefs:
    - name: clahan-gateway
      namespace: {{ .Values.global.namespace }}
  hostnames:
    - "argocd.{{ .Values.ingress.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
