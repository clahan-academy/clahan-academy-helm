# helm/clahan-academy/templates/argocd-route.yaml
# HTTPRoute to route traffic for argocd subdomain to argocd-server in the argocd namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-routes
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: argocd-routes
    app.kubernetes.io/managed-by: helm
spec:
  parentRefs:
    - name: clahan-gateway
      namespace: {{ .Values.global.namespace }}
  hostnames:
    - "argocd.{{ .Values.ingress.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80
---
# Gateway API requires an explicit ReferenceGrant in the TARGET namespace
# (argocd) before an HTTPRoute in another namespace (clahan-production) is
# allowed to reference a Service there - without it, kgateway refuses to
# resolve the backend (status: ResolvedRefs=False, reason=RefNotPermitted)
# and Envoy has no upstream cluster to route to, producing a bodiless 500
# even though argocd-server itself is perfectly healthy. This was the
# actual root cause, confirmed by testing argocd-server directly via
# port-forward (200 OK) while the route through the Gateway 500'd.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-argocd
  namespace: argocd
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.global.namespace }}
  to:
    - group: ""
      kind: Service
      name: argocd-server
