# clahan-academy/templates/monitoring.yaml
# Deploy Prometheus and Grafana for cluster monitoring

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.global.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
      # The default /metrics path above is the kubelet PROCESS's own metrics
      # (kubelet_running_pods, go_goroutines, etc.) - container-level
      # CPU/memory (container_cpu_usage_seconds_total etc.) comes from a
      # separate cAdvisor endpoint the kubelet also exposes. Without this
      # job, the dashboard's CPU/memory panels stay empty even with the
      # kubernetes-nodes job's targets showing "up".
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        metrics_path: /metrics/cadvisor
      # node-exporter is headless (clusterIP: None) so role:endpoints
      # discovers each DaemonSet pod's address:9100 directly.
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: node-exporter
      # kube-state-metrics is a single stable in-namespace Service - no
      # need for k8s service discovery, just scrape it directly.
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics:8080']
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
---
# Prometheus's kubernetes_sd_configs (role: endpoints/node/pod) needs
# cluster-level list/watch RBAC to discover any scrape targets at all, and
# the apiserver job needs nonResourceURL access to /metrics specifically.
# Without this, Prometheus was running under the namespace's default
# ServiceAccount (no permissions), silently discovering zero targets on
# every job - which is why every dashboard panel showed "no data" even
# though Prometheus itself was healthy and running.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Values.global.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      nodeSelector:
        pool: app
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: storage-volume
              mountPath: /prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
        - name: storage-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.global.namespace }}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus_default
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.global.namespace }}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
# Minimal starter dashboard built only from metrics this exact Prometheus
# config actually scrapes (no node-exporter or kube-state-metrics are
# deployed here, so a generic community dashboard ID would just show "No
# Data" on every panel). Survives pod restarts now via the PVC below,
# unlike a manually-imported dashboard which previously lived only in
# Grafana's emptyDir sqlite file and was wiped on every restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.global.namespace }}
data:
  cluster-overview.json: |
    {
      "title": "Clahan Academy - Cluster Overview",
      "uid": "clahan-cluster-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Scrape Target Health",
          "type": "stat",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "up", "legendFormat": "{{`{{job}}`}} - {{`{{instance}}`}}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ]
            }
          }
        },
        {
          "id": 2,
          "title": "API Server Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "sum(rate(apiserver_request_total[5m])) by (code)", "legendFormat": "{{`{{code}}`}}", "refId": "A" }
          ]
        },
        {
          "id": 3,
          "title": "Container CPU Usage - clahan-production",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"clahan-production\"}[5m])) by (pod)", "legendFormat": "{{`{{pod}}`}}", "refId": "A" }
          ]
        },
        {
          "id": 4,
          "title": "Container Memory Usage - clahan-production",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "sum(container_memory_working_set_bytes{namespace=\"clahan-production\"}) by (pod)", "legendFormat": "{{`{{pod}}`}}", "refId": "A" }
          ]
        }
      ]
    }
  node-storage-health.json: |
    {
      "title": "Clahan Academy - Node & Storage Health",
      "uid": "clahan-node-storage-health",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Kubelet Process CPU by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "rate(process_cpu_seconds_total{job=\"kubernetes-nodes\"}[5m])", "legendFormat": "{{`{{instance}}`}}", "refId": "A" }
          ]
        },
        {
          "id": 2,
          "title": "Kubelet Process Memory by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "process_resident_memory_bytes{job=\"kubernetes-nodes\"}", "legendFormat": "{{`{{instance}}`}}", "refId": "A" }
          ]
        },
        {
          "id": 3,
          "title": "PVC Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "100 * kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes", "legendFormat": "{{`{{namespace}}`}}/{{`{{persistentvolumeclaim}}`}}", "refId": "A" }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100, "min": 0 } }
        },
        {
          "id": 4,
          "title": "Pod Network I/O (receive) - clahan-production",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"clahan-production\"}[5m])) by (pod)", "legendFormat": "{{`{{pod}}`}}", "refId": "A" }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        }
      ]
    }
  pod-status.json: |
    {
      "title": "Clahan Academy - Pod Status",
      "uid": "clahan-pod-status",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "Pods by Phase", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "sum(kube_pod_status_phase{namespace=\"clahan-production\"}) by (phase)", "legendFormat": "{{`{{phase}}`}}", "refId": "A" } ] },
        { "id": 2, "title": "Container Restarts (rate, 1h)", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"clahan-production\"}[1h])) by (pod)", "legendFormat": "{{`{{pod}}`}}", "refId": "A" } ] },
        { "id": 3, "title": "Ready vs Not Ready Containers", "type": "timeseries", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "sum(kube_pod_container_status_ready{namespace=\"clahan-production\"})", "legendFormat": "Ready", "refId": "A" }, { "expr": "sum(1 - kube_pod_container_status_ready{namespace=\"clahan-production\"})", "legendFormat": "Not Ready", "refId": "B" } ] }
      ]
    }
  deployment-health.json: |
    {
      "title": "Clahan Academy - Deployment Health",
      "uid": "clahan-deployment-health",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "Desired vs Available Replicas", "type": "timeseries", "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "kube_deployment_spec_replicas{namespace=\"clahan-production\"}", "legendFormat": "{{`{{deployment}}`}} desired", "refId": "A" },
            { "expr": "kube_deployment_status_replicas_available{namespace=\"clahan-production\"}", "legendFormat": "{{`{{deployment}}`}} available", "refId": "B" }
          ] },
        { "id": 2, "title": "Unavailable Replicas", "type": "timeseries", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "kube_deployment_status_replicas_unavailable{namespace=\"clahan-production\"}", "legendFormat": "{{`{{deployment}}`}}", "refId": "A" } ] }
      ]
    }
  hpa-autoscaling.json: |
    {
      "title": "Clahan Academy - HPA Autoscaling",
      "uid": "clahan-hpa-autoscaling",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "Current vs Desired Replicas per HPA", "type": "timeseries", "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"clahan-production\"}", "legendFormat": "{{`{{horizontalpodautoscaler}}`}} current", "refId": "A" },
            { "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"clahan-production\"}", "legendFormat": "{{`{{horizontalpodautoscaler}}`}} desired", "refId": "B" }
          ] },
        { "id": 2, "title": "Max Replicas Ceiling", "type": "timeseries", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"clahan-production\"}", "legendFormat": "{{`{{horizontalpodautoscaler}}`}}", "refId": "A" } ] }
      ]
    }
  resource-requests-limits.json: |
    {
      "title": "Clahan Academy - Resource Requests vs Limits",
      "uid": "clahan-resource-req-limits",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "CPU Requests vs Limits by Pod", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "sum(kube_pod_container_resource_requests{namespace=\"clahan-production\",resource=\"cpu\"}) by (pod)", "legendFormat": "{{`{{pod}}`}} request", "refId": "A" },
            { "expr": "sum(kube_pod_container_resource_limits{namespace=\"clahan-production\",resource=\"cpu\"}) by (pod)", "legendFormat": "{{`{{pod}}`}} limit", "refId": "B" }
          ] },
        { "id": 2, "title": "Memory Requests vs Limits by Pod", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "sum(kube_pod_container_resource_requests{namespace=\"clahan-production\",resource=\"memory\"}) by (pod)", "legendFormat": "{{`{{pod}}`}} request", "refId": "A" },
            { "expr": "sum(kube_pod_container_resource_limits{namespace=\"clahan-production\",resource=\"memory\"}) by (pod)", "legendFormat": "{{`{{pod}}`}} limit", "refId": "B" }
          ] }
      ]
    }
  node-exporter-cpu.json: |
    {
      "title": "Clahan Academy - Node CPU (node-exporter)",
      "uid": "clahan-node-cpu",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "CPU Usage by Mode", "type": "timeseries", "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "sum(rate(node_cpu_seconds_total[5m])) by (mode)", "legendFormat": "{{`{{mode}}`}}", "refId": "A" } ] },
        { "id": 2, "title": "Load Average (1m)", "type": "timeseries", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "node_load1", "legendFormat": "{{`{{instance}}`}}", "refId": "A" } ] }
      ]
    }
  node-exporter-memory.json: |
    {
      "title": "Clahan Academy - Node Memory (node-exporter)",
      "uid": "clahan-node-memory",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "Available vs Total Memory", "type": "timeseries", "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [
            { "expr": "node_memory_MemAvailable_bytes", "legendFormat": "{{`{{instance}}`}} available", "refId": "A" },
            { "expr": "node_memory_MemTotal_bytes", "legendFormat": "{{`{{instance}}`}} total", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } } },
        { "id": 2, "title": "Memory Used %", "type": "timeseries", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "legendFormat": "{{`{{instance}}`}}", "refId": "A" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100, "min": 0 } } }
      ]
    }
  node-exporter-disk.json: |
    {
      "title": "Clahan Academy - Node Disk (node-exporter)",
      "uid": "clahan-node-disk",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "Filesystem Available", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "node_filesystem_avail_bytes{fstype!=\"tmpfs\"}", "legendFormat": "{{`{{instance}}`}} {{`{{mountpoint}}`}}", "refId": "A" } ],
          "fieldConfig": { "defaults": { "unit": "bytes" } } },
        { "id": 2, "title": "Disk I/O Time", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "rate(node_disk_io_time_seconds_total[5m])", "legendFormat": "{{`{{instance}}`}} {{`{{device}}`}}", "refId": "A" } ] }
      ]
    }
  node-exporter-network.json: |
    {
      "title": "Clahan Academy - Node Network (node-exporter)",
      "uid": "clahan-node-network",
      "schemaVersion": 38, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "title": "Network Receive", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*\"}[5m])", "legendFormat": "{{`{{instance}}`}} {{`{{device}}`}}", "refId": "A" } ],
          "fieldConfig": { "defaults": { "unit": "Bps" } } },
        { "id": 2, "title": "Network Transmit", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus_default" },
          "targets": [ { "expr": "rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*\"}[5m])", "legendFormat": "{{`{{instance}}`}} {{`{{device}}`}}", "refId": "A" } ],
          "fieldConfig": { "defaults": { "unit": "Bps" } } }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      nodeSelector:
        pool: app
      # A fresh Azure Disk PV mounts root-owned by default. The grafana/grafana
      # image runs as uid/gid 472, which had no write access to the new PVC
      # (confirmed: "GF_PATHS_DATA is not writable" / "mkdir: Permission
      # denied" in the container logs) - emptyDir never had this problem
      # since its ownership matches whatever the container can write.
      # fsGroup chowns the volume to gid 472 on mount, fixing it.
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          volumeMounts:
            - name: storage-volume
              mountPath: /var/lib/grafana
            - name: datasources-volume
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider-volume
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-volume
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: grafana-storage
        - name: datasources-volume
          configMap:
            name: grafana-datasources
        - name: dashboard-provider-volume
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards-volume
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
