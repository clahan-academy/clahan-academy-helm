# helm/clahan-academy/templates/gateway.yaml
# kGateway - Gateway API implementation
# Replaces AGIC/nginx ingress controller
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: clahan-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: clahan-gateway
    app.kubernetes.io/managed-by: helm
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-ipv4: "10.0.4.250"
    gateway.kgateway.dev/gateway-parameters-name: clahan-gateway-params
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: clahan-gateway-params


  # HTTP only - Application Gateway terminates TLS at the edge (using the
  # Key Vault-backed clahan-ssl-cert) and talks plain HTTP to this backend
  # pool, so an in-cluster HTTPS listener was never on the real traffic path.
  # It used to require a separately-managed self-signed clahan-tls-secret
  # that wasn't recreated automatically, which could leave the whole Gateway
  # unable to admit any route after an infra rebuild.
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All