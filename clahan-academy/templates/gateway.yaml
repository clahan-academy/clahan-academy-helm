# helm/clahan-academy/templates/gateway.yaml
# kGateway - Gateway API implementation
# Replaces AGIC/nginx ingress controller
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: clahan-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: clahan-gateway
    app.kubernetes.io/managed-by: helm
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-ipv4: "10.0.4.250"
    gateway.kgateway.dev/gateway-parameters-name: clahan-gateway-params
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: clahan-gateway-params


  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: clahan-tls-secret
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All