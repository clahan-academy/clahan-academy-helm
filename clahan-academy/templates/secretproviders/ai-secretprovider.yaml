# helm/clahan-academy/templates/secretproviders/ai-secretprovider.yaml

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: clahan-ai-secrets
  namespace: clahan-academy
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.azure.workloadIdentity.ai.clientId }}
    keyvaultName: {{ .Values.azure.keyVaultName }}
    cloudName: ""
    tenantID: {{ .Values.azure.tenantId }}
    objects: |
      array:
        - |
          objectName: ai-port
          objectType: secret
        - |
          objectName: ollama-url
          objectType: secret
  secretObjects:
    - secretName: clahan-ai-secrets
      type: Opaque
      data:
        - key: PORT
          objectName: ai-port
        - key: OLLAMA_URL
          objectName: ollama-url
