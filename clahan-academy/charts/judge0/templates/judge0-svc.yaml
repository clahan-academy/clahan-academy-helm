# helm/clahan-academy/templates/services/judge0-svc.yaml

apiVersion: v1
kind: Service
metadata:
  name: judge0-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: judge0-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
      name: http
  selector:
    app: judge0-api
