# helm/clahan-academy/templates/deployments/judge0-api-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge0-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: judge0-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge0-api
  template:
    metadata:
      labels:
        app: judge0-api
        azure.workload.identity/use: "true"
    spec:
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: clahan-exam-secrets
      containers:
        - name: judge0-api
          image: "{{ .Values.api.image }}"
          command: ["/bin/sh", "-c"]
          args:
            - >
              export DATABASE_URL=$(cat /mnt/secrets/JUDGE0_DB_CONNECTION_STRING);
              exec ./scripts/server
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: REDIS_HOST
              value: "judge0-redis"
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /system_info
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /system_info
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
