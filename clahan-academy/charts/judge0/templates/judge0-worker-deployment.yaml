# helm/clahan-academy/templates/deployments/judge0-worker-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge0-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app: judge0-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge0-worker
  template:
    metadata:
      labels:
        app: judge0-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: clahan-exam-sa
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
      containers:
        - name: judge0-worker
          image: "{{ .Values.worker.image }}"
          command: ["/bin/sh", "-c"]
          args:
            - >
              export DATABASE_URL=$(ruby -e "
                require 'net/http'
                require 'json'
                require 'uri'
                federated_token = File.read(ENV['AZURE_FEDERATED_TOKEN_FILE']).strip
                uri = URI.parse(\"#{ENV['AZURE_AUTHORITY_HOST']}#{ENV['AZURE_TENANT_ID']}/oauth2/token\")
                req = Net::HTTP::Post.new(uri)
                req.set_form_data(
                  'grant_type' => 'client_credentials',
                  'client_id' => ENV['AZURE_CLIENT_ID'],
                  'client_assertion_type' => 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
                  'client_assertion' => federated_token,
                  'resource' => 'https://vault.azure.net'
                )
                res = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(req) }
                access_token = JSON.parse(res.body)['access_token']
                secret_uri = URI.parse(\"https://#{ENV['KEY_VAULT_NAME']}.vault.azure.net/secrets/judge0-db-connection-string?api-version=7.4\")
                secret_req = Net::HTTP::Get.new(secret_uri)
                secret_req['Authorization'] = \"Bearer #{access_token}\"
                secret_res = Net::HTTP.start(secret_uri.hostname, secret_uri.port, use_ssl: true) { |http| http.request(secret_req) }
                puts JSON.parse(secret_res.body)['value']
              ");
              exec ./scripts/workers
          env:
            - name: KEY_VAULT_NAME
              value: {{ .Values.global.azure.keyVaultName | quote }}
            - name: REDIS_HOST
              value: "judge0-redis"
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            privileged: true
