# helm/clahan-academy/templates/services/proctoring-svc.yaml

apiVersion: v1
kind: Service
metadata:
  name: proctoring-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: proctoring-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
  selector:
    app: proctoring-service
