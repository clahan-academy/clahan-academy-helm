# helm/clahan-academy/templates/serviceaccounts/proctoring-sa.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: clahan-proctoring-sa
  namespace: {{ .Values.global.namespace }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.global.azure.workloadIdentity.proctoring.clientId | quote }}
  labels:
    azure.workload.identity/use: "true"
