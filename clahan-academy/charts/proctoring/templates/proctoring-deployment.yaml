# helm/clahan-academy/templates/deployments/proctoring-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: proctoring-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: proctoring-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: proctoring-service
  template:
    metadata:
      labels:
        app: proctoring-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: clahan-proctoring-sa
      containers:
        - name: proctoring
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: KEY_VAULT_NAME
              value: {{ .Values.global.azure.keyVaultName | quote }}
          ports:
            - containerPort: {{ .Values.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
