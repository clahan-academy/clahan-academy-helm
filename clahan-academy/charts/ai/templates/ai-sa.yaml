# helm/clahan-academy/templates/serviceaccounts/ai-sa.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: clahan-ai-sa
  namespace: {{ .Values.global.namespace }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.global.azure.workloadIdentity.ai.clientId | quote }}
  labels:
    azure.workload.identity/use: "true"
