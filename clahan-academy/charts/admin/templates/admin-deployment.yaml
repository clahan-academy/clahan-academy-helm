# helm/clahan-academy/templates/deployments/admin-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: admin-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
        azure.workload.identity/use: "true"
    spec:
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: clahan-admin-secrets
      containers:
        - name: admin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >
              for f in /mnt/secrets/*; do
                if [ -f "$f" ]; then
                  export "$(basename "$f")"="$(cat "$f")"
                fi
              done;
              node dist/index.js
          ports:
            - containerPort: {{ .Values.port }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
