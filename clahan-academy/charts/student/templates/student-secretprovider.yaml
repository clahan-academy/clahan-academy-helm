# helm/clahan-academy/templates/secretproviders/student-secretprovider.yaml

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: clahan-student-secrets
  namespace: {{ .Values.global.namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.global.azure.workloadIdentity.student.clientId }}
    keyvaultName: {{ .Values.global.azure.keyVaultName }}
    cloudName: ""
    tenantID: {{ .Values.global.azure.tenantId }}
    objects: |
      array:
        - |
          objectName: student-port
          objectAlias: PORT
          objectType: secret
        - |
          objectName: db-connection-string
          objectAlias: DATABASE_URL
          objectType: secret
        - |
          objectName: jwt-access-secret
          objectAlias: JWT_ACCESS_SECRET
          objectType: secret
        - |
          objectName: rate-limit-max
          objectAlias: RATE_LIMIT_MAX
          objectType: secret
