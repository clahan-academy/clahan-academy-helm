# helm/clahan-academy/templates/services/student-svc.yaml

apiVersion: v1
kind: Service
metadata:
  name: student-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: student-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
  selector:
    app: student-service
