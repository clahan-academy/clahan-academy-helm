# helm/clahan-academy/templates/secretproviders/exam-secretprovider.yaml

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: clahan-exam-secrets
  namespace: clahan-academy
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.global.azure.workloadIdentity.exam.clientId }}
    keyvaultName: {{ .Values.global.azure.keyVaultName }}
    cloudName: ""
    tenantID: {{ .Values.global.azure.tenantId }}
    objects: |
      array:
        - |
          objectName: exam-port
          objectType: secret
        - |
          objectName: db-connection-string
          objectType: secret
        - |
          objectName: redis-connection-string
          objectType: secret
        - |
          objectName: jwt-access-secret
          objectType: secret
        - |
          objectName: ai-service-url
          objectType: secret
        - |
          objectName: judge0-url
          objectType: secret
        - |
          objectName: rate-limit-max
          objectType: secret
        - |
          objectName: judge0-db-connection-string
          objectType: secret
  secretObjects:
    - secretName: clahan-exam-secrets
      type: Opaque
      data:
        - key: PORT
          objectName: exam-port
        - key: DATABASE_URL
          objectName: db-connection-string
        - key: REDIS_URL
          objectName: redis-connection-string
        - key: JWT_ACCESS_SECRET
          objectName: jwt-access-secret
        - key: AI_SERVICE_URL
          objectName: ai-service-url
        - key: JUDGE0_URL
          objectName: judge0-url
        - key: RATE_LIMIT_MAX
          objectName: rate-limit-max
        - key: JUDGE0_DB_CONNECTION_STRING
          objectName: judge0-db-connection-string
