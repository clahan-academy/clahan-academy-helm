proctoring:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 60
  image:
    tag: v0.5.4
notification:
  replicaCount: 1
  autoscaling:
