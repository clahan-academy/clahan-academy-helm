# helm/clahan-academy/values-prod.yaml

# Production environment overrides
# Applied on top of values.yaml for dev deployments
# ArgoCD uses: values.yaml + values-prod.yaml

global:
  environment: prod
  namespace: clahan-production
  azure:
    keyVaultName: "kv-clahan-prod"
    workloadIdentity:
      frontend:
        clientId: "d5abbc88-7f64-4441-8df2-281915304274"
      auth:
        clientId: "3845c644-2def-4a2b-895b-906f950b9578"
      admin:
        clientId: "5c955535-9465-4917-ad44-dd44ffe6ea5e"
      student:
        clientId: "86eb0134-c0b1-4447-bf24-74252dc5a83c"
      exam:
        clientId: "67d68d4e-2fa6-49c1-80b9-788a89662000"
      proctoring:
        clientId: "556480b4-b149-4a21-a38a-7854bcf6baba"
      notification:
        clientId: "b5b12a40-c467-48b3-a730-fcf30669e4f4"
      ai:
        clientId: "dfca4cdf-ca5a-4c30-abc1-6967dc0ba7cc"
ingress:
  host: clahaanacademy.online
# Prod: scaled down to 1 replica to save resources (frontend and auth set to 2 for capstone evaluation compliance)
frontend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  image:
    tag: v0.5.5
auth:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
  image:
    tag: v0.5.5
admin:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.5
student:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.5
exam:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
  image:
    tag: v0.5.5
proctoring:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
  image:
    tag: v0.5.5
notification:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.5
ai:
  # Kept at 1, unlike every other service: the ai node pool is fixed at a
  # single node (no autoscaling, by your choice) and is already at 91% CPU
  # running ollama alongside it - a 2nd replica was stuck Pending with no
  # capacity to schedule onto. Revisit if that pool ever gets a 2nd node.
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.5
