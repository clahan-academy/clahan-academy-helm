# helm/clahan-academy/values-prod.yaml

# Production environment overrides
# Applied on top of values.yaml for dev deployments
# ArgoCD uses: values.yaml + values-prod.yaml

global:
  environment: prod
  namespace: clahan-production
  azure:
    keyVaultName: "kv-clahan-prod"
    workloadIdentity:
      frontend:
        clientId: "575910d8-677f-46b4-9601-48149045eb4e"
      auth:
        clientId: "b2c84597-2538-4991-ab2a-84c2656c021f"
      admin:
        clientId: "2037bf23-0a02-4c3a-935e-6ac2527f312e"
      student:
        clientId: "8366a76e-9098-4f53-976f-42381d4b6fe2"
      exam:
        clientId: "b5bc996b-efa0-4984-96ce-08733e315ad3"
      proctoring:
        clientId: "4968416a-f344-4c7e-a61f-add0e39d374a"
      notification:
        clientId: "c8977a10-8b56-45a1-a92c-909d62fb66f7"
      ai:
        clientId: "6814ccf0-4f2b-42c1-b62f-93254ccc4903"
ingress:
  host: clahaanacademy.online
# Prod: scaled down to 1 replica to save resources (frontend and auth set to 2 for capstone evaluation compliance)
frontend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  image:
    tag: v0.5.4
auth:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
  image:
    tag: v0.5.4
admin:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.4
student:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.4
exam:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 60
  image:
