# helm/clahan-academy/values-prod.yaml

# Production environment overrides
# Applied on top of values.yaml for dev deployments
# ArgoCD uses: values.yaml + values-prod.yaml

global:
  environment: prod
  namespace: clahan-production
  azure:
    keyVaultName: "kv-clahan-prod"
    workloadIdentity:
      frontend:
        clientId: "2dfdd5b0-9508-45a4-96c0-19591f719960"
      auth:
        clientId: "4ee30077-073e-4f35-83b0-cb976619cd9d"
      admin:
        clientId: "10b61956-29c5-4387-9e0f-1326c900dd2b"
      student:
        clientId: "78eda1ef-2b69-4230-8b06-8d9a370b9a89"
      exam:
        clientId: "6b208bbd-a225-4da9-840f-ee131bb692ab"
      proctoring:
        clientId: "ae39ece4-fca9-4fa9-9a67-6fbf2dfaeca7"
      notification:
        clientId: "cece8811-2e5f-445e-950a-3ea634243c06"
      ai:
        clientId: "cbdd29aa-5dd4-4f56-9728-87b2008bbc55"
ingress:
  host: clahaanacademy.online
# Prod: scaled down to 1 replica to save resources (frontend and auth set to 2 for capstone evaluation compliance)
frontend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  image:
    tag: v0.5.3
auth:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
  image:
    tag: v0.5.3
admin:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.3
student:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 65
  image:
    tag: v0.5.3
exam:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 60
  image:
