# helm/clahan-academy/values.yaml

global:
  imageRegistry: acrclahanacademy.azurecr.io
  namespace: clahan-academy
  environment: dev
  imagePullPolicy: Always

azure:
  tenantId: "67e6de35-58f8-4419-b1c4-1e5d7c49e04b"
  keyVaultName: "kv-clahan-academy"
  workloadIdentity:
    frontend:
      clientId: "PLACEHOLDER_FRONTEND_CLIENT_ID"
    auth:
      clientId: "PLACEHOLDER_AUTH_CLIENT_ID"
    admin:
      clientId: "PLACEHOLDER_ADMIN_CLIENT_ID"
    student:
      clientId: "PLACEHOLDER_STUDENT_CLIENT_ID"
    exam:
      clientId: "PLACEHOLDER_EXAM_CLIENT_ID"
    proctoring:
      clientId: "PLACEHOLDER_PROCTORING_CLIENT_ID"
    notification:
      clientId: "PLACEHOLDER_NOTIFICATION_CLIENT_ID"
    ai:
      clientId: "PLACEHOLDER_AI_CLIENT_ID"

frontend:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-frontend
    tag: "latest"
  replicaCount: 2
  port: 5173
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

auth:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-auth
    tag: "latest"
  replicaCount: 2
  port: 4001
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

admin:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-admin
    tag: "latest"
  replicaCount: 1
  port: 4002
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

student:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-student
    tag: "latest"
  replicaCount: 1
  port: 4003
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

exam:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-exam
    tag: "latest"
  replicaCount: 2
  port: 4004
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

proctoring:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-proctoring
    tag: "latest"
  replicaCount: 2
  port: 4005
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

notification:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-notification
    tag: "latest"
  replicaCount: 1
  port: 4006
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

ai:
  image:
    repository: acrclahanacademy.azurecr.io/clahan-ai
    tag: "latest"
  replicaCount: 1
  port: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  nodeSelector:
    pool: ai
  tolerations:
    - key: dedicated
      operator: Equal
      value: ai
      effect: NoSchedule

ollama:
  image: ollama/ollama:latest
  replicaCount: 1
  port: 11434
  model: phi3
  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  nodeSelector:
    pool: ai
  tolerations:
    - key: dedicated
      operator: Equal
      value: ai
      effect: NoSchedule
  persistence:
    size: 20Gi
    storageClass: azurefile-csi

judge0:
  api:
    image: mrkushalsm/judge0:cgv2
    port: 2358
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
  worker:
    image: mrkushalsm/judge0:cgv2
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"
  redis:
    image: redis:7-alpine
    port: 6379
  nodeSelector:
    pool: ai
  tolerations:
    - key: dedicated
      operator: Equal
      value: ai
      effect: NoSchedule

ingress:
  enabled: true
  className: azure-application-gateway
  host: clahaanacademy.online
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
