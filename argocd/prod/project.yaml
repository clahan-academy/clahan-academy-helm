# argocd/prod/project.yaml

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: clahan-academy-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Clahan Academy V2 Production - Online Exam Platform"
  
  sourceRepos:
    - https://github.com/clahan-academy/clahan-academy-helm.git
  
  destinations:
    - namespace: clahan-production
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: secrets-store.csi.x-k8s.io
      kind: SecretProviderClass
  
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: PersistentVolumeClaim
    - group: networking.k8s.io
      kind: Ingress
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: secrets-store.csi.x-k8s.io
      kind: SecretProviderClass
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
  
  roles:
    - name: administrator
      description: Production admin sync access
      policies:
        - p, proj:clahan-academy-prod:administrator, applications, get, clahan-academy-prod/*, allow
        - p, proj:clahan-academy-prod:administrator, applications, sync, clahan-academy-prod/*, allow
