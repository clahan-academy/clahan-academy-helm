# argocd/dev/application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clahan-academy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app: clahan-academy
    environment: dev
spec:
  project: clahan-academy
  
  source:
    repoURL: https://github.com/M-VIGNESH3/clahan-academy.git
    targetRevision: main
    path: helm/clahan-academy
    helm:
      valueFiles:
        - values.yaml
  
  destination:
    server: https://kubernetes.default.svc
    namespace: clahan-academy
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 3
